<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>fragment</title>
        <style>
            .initial-loader {
                position: fixed;
                inset: 0;
                z-index: 10000;
                display: grid;
                place-items: center;
                background-color: rgba(0, 0, 0, 0.9);
                opacity: 1;
                transition: opacity 300ms ease;
            }

            .initial-loader--hidden {
                opacity: 0;
                pointer-events: none;
            }

            .initial-loader .splash-dots {
                display: flex;
                gap: 12px;
                align-items: center;
                justify-content: center;
            }

            .initial-loader .splash-dots span {
                width: 13px;
                height: 13px;
                background-color: white;
                border-radius: 50%;
                opacity: 0.35;
                animation: initial-loader-bounce 1.2s infinite ease-in-out;
            }

            .initial-loader .splash-dots span:nth-child(2) {
                animation-delay: 0.2s;
            }

            .initial-loader .splash-dots span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes initial-loader-bounce {
                0%,
                80%,
                100% {
                    transform: scale(0.7);
                    opacity: 0.35;
                }

                40% {
                    transform: scale(1.2);
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div id="initial-loader" class="initial-loader">
            <div class="splash-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
